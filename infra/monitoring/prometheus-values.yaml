prometheus:
  prometheusSpec:
    # Scrape every 15 seconds
    scrapeInterval: 15s
    evaluationInterval: 15s

    # Tell Prometheus to find ServiceMonitors in all namespaces
    serviceMonitorSelectorNilUsesHelmValues: false
    serviceMonitorSelector: {}
    serviceMonitorNamespaceSelector: {}

    # Resource limits for local dev
    resources:
      requests:
        memory: 256Mi
        cpu: 100m
      limits:
        memory: 512Mi
        cpu: 500m

grafana:
  enabled: true
  adminPassword: "nexuscloud-grafana"

  resources:
    requests:
      memory: 128Mi
      cpu: 50m
    limits:
      memory: 256Mi
      cpu: 200m

  # Pre-load the Kubernetes dashboard
  dashboardProviders:
    dashboardproviders.yaml:
      apiVersion: 1
      providers:
        - name: default
          orgId: 1
          folder: NexusCloud
          type: file
          disableDeletion: false
          options:
            path: /var/lib/grafana/dashboards/default

alertmanager:
  enabled: false  # Keep it simple for now

nodeExporter:
  enabled: false   # Scrapes CPU, memory, disk from the node