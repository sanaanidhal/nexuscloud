name: Auth Service CI

on:
  push:
    branches: [ main ]
    paths:
      - 'services/auth-service/**'
      - '.github/workflows/auth-service-ci.yml'
  pull_request:
    branches: [ main ]
    paths:
      - 'services/auth-service/**'

env:
  IMAGE_NAME: ${{ secrets.DOCKERHUB_USERNAME }}/nexuscloud-auth-service

jobs:
  build-and-test:
    name: Build, Test & Push
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout the code
      - name: Checkout code
        uses: actions/checkout@v4

      # 2. Set up Docker Buildx (enables multi-platform builds)
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      # 3. Login to Docker Hub
      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. Extract metadata for tags
      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.IMAGE_NAME }}
          tags: |
            type=sha,prefix=sha-
            type=raw,value=latest,enable=${{ github.ref == 'refs/heads/main' }}

      # 5. Build the image and run it for testing
      - name: Build Docker image for testing
        run: |
          docker build \
            -t nexuscloud/auth-service:test \
            ./services/auth-service

      # 6. Run the container and health check it
      - name: Run container and verify health
        run: |
          docker run -d \
            --name auth-service-test \
            -p 3000:3000 \
            -e JWT_SECRET=ci-test-secret \
            nexuscloud/auth-service:test

          echo "Waiting for service to start..."
          sleep 5

          # Health check
          RESPONSE=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:3000/health)
          if [ "$RESPONSE" != "200" ]; then
            echo "Health check FAILED — HTTP $RESPONSE"
            docker logs auth-service-test
            exit 1
          fi
          echo "Health check PASSED — HTTP $RESPONSE"

          # Login check
          TOKEN_RESPONSE=$(curl -s -X POST http://localhost:3000/login \
            -H "Content-Type: application/json" \
            -d '{"username":"admin","password":"password"}')

          echo "Login response: $TOKEN_RESPONSE"

          TOKEN=$(echo $TOKEN_RESPONSE | grep -o '"token":"[^"]*"' | cut -d'"' -f4)
          if [ -z "$TOKEN" ]; then
            echo "Login test FAILED — no token returned"
            exit 1
          fi
          echo "Login test PASSED — token received"

          # Verify token
          VERIFY_RESPONSE=$(curl -s http://localhost:3000/verify \
            -H "Authorization: Bearer $TOKEN")
          echo "Verify response: $VERIFY_RESPONSE"
          echo "All tests PASSED"

      # 7. Push to Docker Hub (only on main branch)
      - name: Build and push to Docker Hub
        uses: docker/build-push-action@v5
        with:
          context: ./services/auth-service
          push: ${{ github.ref == 'refs/heads/main' }}
          tags: ${{ steps.meta.outputs.tags }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      # 8. Print image digest
      - name: Print image digest
        run: echo "Image pushed with tags — ${{ steps.meta.outputs.tags }}"