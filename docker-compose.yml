
services:

  # PostgreSQL database
  postgres:
    image: postgres:15-alpine
    container_name: nexuscloud-postgres
    environment:
      POSTGRES_USER: nexuscloud
      POSTGRES_PASSWORD: nexuscloud_password
      POSTGRES_DB: nexuscloud_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U nexuscloud -d nexuscloud_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  # Auth Service (Node.js)
  auth-service:
    build: ./services/auth-service
    container_name: nexuscloud-auth
    ports:
      - "3000:3000"
    environment:
      JWT_SECRET: nexuscloud-super-secret
      PORT: 3000
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

  # Product API (Go)
  product-api:
    build: ./services/product-api
    container_name: nexuscloud-product-api
    ports:
      - "8080:8080"
    environment:
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USER: nexuscloud
      DB_PASSWORD: nexuscloud_password
      DB_NAME: nexuscloud_db
      PORT: 8080
      GIN_MODE: release
    depends_on:
      postgres:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:8080/health || exit 1"]
      interval: 30s
      timeout: 3s
      retries: 3

volumes:
  postgres_data: